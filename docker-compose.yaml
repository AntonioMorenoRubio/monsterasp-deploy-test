services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: monsterasp-ssql22
    environment:
      SA_PASSWORD: "Contrasenia1234!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
